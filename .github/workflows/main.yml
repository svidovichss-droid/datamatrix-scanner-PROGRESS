name: Build DataMatrix Scanner EXE

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Check OpenCV and pylibdmtx availability
        run: |
          python -c "import cv2; print(f'OpenCV: {cv2.__version__}')"
          python -c "import pylibdmtx; print('pylibdmtx: OK')" 2>&1 || echo "pylibdmtx: Not available - fallback mode"

      - name: Build with PyInstaller (portable)
        run: |
          pyinstaller datamatrix_scanner.spec --clean --noconfirm
        env:
          PYINSTALLER_FORCE_WINMATRIX64: 1

      - name: Create distributable zip
        run: |
          $version = if ($env:GITHUB_REF -match 'v(.+)') { $matches[1] } else { "dev" }
          $name = "DataMatrixScanner-win64-$version"
          New-Item -ItemType Directory -Path $name -Force
          Copy-Item "dist/DataMatrixScanner/*" -Destination $name -Recurse -Force
          Copy-Item "README.md" -Destination $name -Force
          Copy-Item "requirements.txt" -Destination $name -Force
          Compress-Archive -Path $name -DestinationPath "$name.zip" -Force
          Get-ChildItem *.zip | Format-Table Name, Length

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DataMatrixScanner-win64
          path: '*.zip'
          retention-days: 30

      - name: Upload EXE directly
        uses: actions/upload-artifact@v4
        with:
          name: DataMatrixScanner-exe
          path: 'dist/DataMatrixScanner/*.exe'
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: '*.zip'
          body: |
            ## DataMatrix Print Quality Scanner

            **ГОСТ Р 57302-2016**

            Авторы: А. Свидович / А. Петляков для PROGRESS

            ### Требования
            - Windows 10/11 x64
            - Промышленная камера с интерфейсом DirectShow

            ### Использование
            1. Распакуйте архив
            2. Запустите `DataMatrixScanner.exe`
            3. Выберите камеру и нажмите СТАРТ
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
